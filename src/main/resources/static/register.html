<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — DiabeteZen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="page-auth">
<div class="auth-layout">
    <div class="auth-panel auth-panel--brand">
        <a href="/index.html" class="auth-back">← Accueil / Akey</a>
        <div class="auth-brand-block">
            <svg class="auth-drop" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <defs>
                    <linearGradient id="authGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#99f6e4"/>
                        <stop offset="100%" stop-color="#fb7185"/>
                    </linearGradient>
                </defs>
                <path fill="url(#authGrad2)" d="M50 8 C50 8 12 48 12 74 C12 94 29 112 50 112 C71 112 88 94 88 74 C88 48 50 8 50 8 Z"/>
            </svg>
            <h1 class="auth-brand-title">Diabete<span>Zen</span></h1>
            <p class="auth-brand-tagline">Quelques informations suffisent pour créer votre espace personnel sécurisé / Kek enfomasyon sifi pou kreye espas pesonel sekirize ou.</p>
        </div>
    </div>
    <div class="auth-panel auth-panel--form">
        <div class="auth-card">
            <h2 class="auth-card__title">Créer un compte / Kreye yon kont</h2>
            <p class="auth-card__hint">Déjà inscrit ? / Ou deja enskri? <a href="/login.html">Connexion / Koneksyon</a></p>
            <p id="messageBox" class="message hidden"></p>
            <form id="registerForm" class="stack">
                <label class="field-label">Nom complet / Non konple
                    <input type="text" id="registerName" required autocomplete="name">
                </label>
                <label class="field-label">Email / Imel
                    <input type="email" id="registerEmail" required autocomplete="email">
                </label>
                <label class="field-label">Mot de passe / Modpas
                    <input type="password" id="registerPassword" minlength="6" required autocomplete="new-password">
                </label>
                <label class="field-label">Type de diabète / Kalite dyabet
                    <select id="registerDiabetesType" required>
                        <option value="type1">Type 1 / Kalite 1</option>
                        <option value="type2">Type 2 / Kalite 2</option>
                        <option value="gestational">Gestationnel / Jestasyonel</option>
                        <option value="other">Autre / Lot</option>
                    </select>
                </label>
                <button class="btn btn--cta btn--block" type="submit">Créer mon compte / Kreye kont mwen</button>
            </form>
        </div>
    </div>
</div>
<script src="/common.js"></script>
<script src="/register.js"></script>
</body>
</html>
