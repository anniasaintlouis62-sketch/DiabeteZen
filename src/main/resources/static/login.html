<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — DiabeteZen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="page-auth">
<div class="auth-layout">
    <div class="auth-panel auth-panel--brand">
        <a href="/index.html" class="auth-back">← Accueil / Akey</a>
        <div class="auth-brand-block">
            <svg class="auth-drop" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <defs>
                    <linearGradient id="authGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#99f6e4"/>
                        <stop offset="100%" stop-color="#fb7185"/>
                    </linearGradient>
                </defs>
                <path fill="url(#authGrad)" d="M50 8 C50 8 12 48 12 74 C12 94 29 112 50 112 C71 112 88 94 88 74 C88 48 50 8 50 8 Z"/>
            </svg>
            <h1 class="auth-brand-title">Diabete<span>Zen</span></h1>
            <p class="auth-brand-tagline">Ravi de vous revoir / Kontan we ou ankò. Connectez-vous pour accéder à votre espace / Konekte pou antre nan espas ou.</p>
        </div>
    </div>
    <div class="auth-panel auth-panel--form">
        <div class="auth-card">
            <h2 class="auth-card__title">Connexion / Koneksyon</h2>
            <p class="auth-card__hint">Pas encore de compte ? / Ou poko gen kont? <a href="/register.html">Inscription / Enskripsyon</a></p>
            <p id="messageBox" class="message hidden"></p>
            <form id="loginForm" class="stack">
                <label class="field-label"><span>Email / Imel</span>
                    <input type="email" id="loginEmail" required autocomplete="email" placeholder="vous@exemple.fr">
                </label>
                <label class="field-label"><span>Mot de passe / Modpas</span>
                    <input type="password" id="loginPassword" required autocomplete="current-password">
                </label>
                <button class="btn btn--cta btn--block" type="submit">Se connecter / Konekte</button>
            </form>
        </div>
    </div>
</div>
<script src="/common.js"></script>
<script src="/login.js"></script>
</body>
</html>
